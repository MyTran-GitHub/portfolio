<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/fonts.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/colors.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/typography.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/spacing.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/effects.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/animation.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/base.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/styles.css">
<script src="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/_ds_bundle.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,300;0,400;0,600;1,400&amp;display=swap" rel="stylesheet">
<style>
  body { margin:0; background-color:var(--paper-100); background-image:var(--paper-grain); color:var(--ink-800); font:var(--text-default); -webkit-font-smoothing:antialiased; }
  .pd-tip { position:relative; cursor:help; }
  .pd-tip-pop { position:absolute; left:0; bottom:100%; margin-bottom:10px; width:230px; background:var(--ink-900); color:var(--paper-50); padding:10px 13px; border-radius:10px; font:300 14px/1.45 'Lora', var(--font-body); opacity:0; transform:translateY(6px); transition:opacity .22s var(--ease-out), transform .22s var(--ease-out); pointer-events:none; z-index:20; }
  .pd-tip:hover .pd-tip-pop { opacity:1; transform:translateY(0); }
</style>
</helmet>
<div style="--accent:#34613C; --accent-ink:#34613C; --accent-soft:#BFE3C2; --hi-mint:#BFE3C2; --lavender-100:#BFE3C2; --lavender-200:#BFE3C2; --lavender-ink:#34613C; --pen-blue:#34613C; --pen-blue-ink:#34613C; --pen-blue-soft:#BFE3C2; --pen-red:#34613C; --pen-red-soft:#BFE3C2; --danger:#34613C; --danger-soft:#BFE3C2; --accent-2:#BFE3C2; --accent-2-ink:#34613C; --hi-yellow-deep:#F2D24B; --font-body:'Lora','Kalam','Patrick Hand',cursive;">
  <nav style="position:sticky; top:0; z-index:50; background:rgba(251,246,233,0.86); backdrop-filter:blur(6px); border-bottom:2px solid var(--stroke);">
    <div style="max-width:1000px; margin:0 auto; padding:12px 28px; display:flex; align-items:center; justify-content:space-between;">
      <a href="The Living Journey.dc.html" style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; font:400 18px var(--font-marker); color:var(--ink-800);">← the living journey</a>
      <a href="The Living Journey.dc.html" style="display:flex; align-items:center; gap:8px; text-decoration:none;">
        <span style="display:flex; align-items:center; justify-content:center; width:36px; height:36px; border:2px solid var(--stroke); background:var(--accent-soft); border-radius:38% 62% 63% 37% / 41% 44% 56% 59%; font:700 17px var(--font-marker); color:var(--accent-ink); transform:rotate(-4deg);">MT</span>
      </a>
    </div>
  </nav>

  <header style="position:relative; overflow:hidden; border-bottom:2px dashed var(--ink-300); background:{{ bandBg }};">
    <div style="max-width:1000px; margin:0 auto; padding:56px 28px 46px;">
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;">
        {{ tagPills }}
      </div>
      <h1 style="margin:0 0 12px; font-weight:400; font-size:54px; line-height:1.06; font-family:'Patrick Hand','Comic Sans MS',cursive; color:var(--ink-900); max-width:820px;">{{ title }}</h1>
      <p style="margin: 0 0 18px; max-width: 660px; font: 300 20px/1.5 var(--font-body); color: var(--ink-600); font-family: Lora; font-size: 19px">{{ tagline }}</p>
      <sc-if value="{{ repoUrl }}">
        <a href="{{ repoUrl }}" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; padding:8px 16px; border:2px solid var(--stroke); background:var(--accent-soft); border-radius:980px; font:400 15px var(--font-marker); color:var(--accent-ink); transition:background .22s var(--ease-out), color .22s;" style-hover="background:var(--accent-ink); color:var(--paper-50);">
          <svg width="17" height="17" fill="currentColor" aria-hidden="true"><use href="assets/icons.svg#github-icon"></use></svg>
          View on GitHub
        </a>
      </sc-if>
    </div>
  </header>

  <main style="max-width: 1000px; margin: 0 auto; padding: 52px 28px 20px; font-family: Lora; font-size: 17px">
    {{ children }}
  </main>

  <footer style="background:var(--ink-900); color:var(--paper-100); margin-top:40px; padding:56px 28px;">
    <div style="max-width:1000px; margin:0 auto; text-align:center;">
      <p style="margin:0 0 18px; font-weight:400; font-size:34px; font-family:'Patrick Hand','Comic Sans MS',cursive; font-style:italic; color:var(--paper-50);">Back to the journey?</p>
      <a href="The Living Journey.dc.html" style="text-decoration:none; padding:11px 24px; border:2px solid var(--paper-100); background:var(--paper-50); color:var(--ink-900); border-radius:255px 15px 225px 15px / 15px 225px 15px 255px; font:400 18px var(--font-marker);">↑ every node</a>
      <div style="margin-top:22px; font:500 12px 'Fira Code',monospace; color:var(--ink-400);">© 2026 My Tran · tran@uni.minerva.edu</div>
    </div>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:700},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Project title&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tagline&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;One-line tagline&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tags&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tag one, Tag two&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;band&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#DCE6F5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;repoUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const h = React.createElement;
    const tags = (p.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    const tagPills = tags.map((t, i) => h('span', { key: i, style: {
      padding: '5px 13px', border: '2px solid var(--stroke)', background: 'var(--paper-50)',
      borderRadius: '980px', font: "400 14px var(--font-marker)", color: 'var(--ink-800)',
      whiteSpace: 'nowrap', flexShrink: 0,
      transform: (i % 2 ? 'rotate(1deg)' : 'rotate(-1deg)'),
    } }, t));
    return {
      title: p.title || 'Project',
      tagline: p.tagline || '',
      bandBg: p.band || 'var(--paper-200)',
      tagPills,
      repoUrl: p.repoUrl || '',
      children: p.children,
    };
  }
}
</script>
</body>
</html>
