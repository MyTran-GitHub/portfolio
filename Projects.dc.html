<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/fonts.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/colors.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/typography.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/spacing.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/effects.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/animation.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/tokens/base.css">
<link rel="stylesheet" href="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/styles.css">
<script src="_ds/paperdoodle-design-system-9051b37f-c90e-4639-84d7-88aea9accfc2/_ds_bundle.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,300;0,400;0,600;1,400&amp;display=swap" rel="stylesheet">
<style>
  body { margin:0; background-color:var(--paper-100); background-image:var(--paper-grain); color:var(--ink-800); font:var(--text-default); -webkit-font-smoothing:antialiased; }
  .pj-row { text-decoration:none; display:block; }
  .pj-card { border:2px solid var(--stroke); background:var(--paper-50); border-radius:14px; box-shadow:2px 3px 0 rgba(34,31,26,.14); transition:transform .22s var(--ease-out), box-shadow .22s var(--ease-out), border-color .22s; }
  .pj-row:hover .pj-card { transform:translateY(-3px) rotate(-.3deg); box-shadow:4px 6px 0 rgba(34,31,26,.16); border-color:var(--accent-ink); }
  .pj-row:hover .pj-arrow { transform:translateX(4px); color:var(--accent-ink); }
  .pj-arrow { transition:transform .22s var(--ease-out), color .22s; display:inline-block; }
  .pj-filter { cursor:pointer; border:2px solid var(--stroke); background:var(--paper-50); color:var(--ink-700); border-radius:980px; padding:8px 18px; font:400 15px var(--font-marker); transition:background .25s var(--ease-out), color .25s, border-color .25s, transform .2s; white-space:nowrap; }
  .pj-filter:hover { transform:translateY(-1px); }
  .pj-filter.pj-active { background:var(--accent-ink); border-color:var(--accent-ink); color:var(--paper-50); }
  .pj-fade { transition:opacity .32s var(--ease-in-out); }
  .pj-list { display:flex; flex-direction:column; gap:22px; }
  .pj-list.pj-grid-mode { display:grid; grid-template-columns:repeat(auto-fill,260px); justify-content:space-between; gap:20px; }
  .pj-grid-mode .pj-row { width:260px; display:block; }

  .pj-list-mode .pj-card { display:grid; grid-template-columns:220px 1fr auto; align-items:center; gap:26px; padding:18px 26px 18px 18px; }
  .pj-list-mode .pj-imgbox { border:2px solid var(--stroke); border-radius:10px; overflow:hidden; aspect-ratio:4/3; background:var(--ink-900); }
  .pj-list-mode .pj-arrow { font:400 30px var(--font-marker); color:var(--ink-400); }
  .pj-list-mode .pj-title { font-size:24px; }
  .pj-list-mode .pj-desc { font-size:15.5px; line-height:1.5; }

  .pj-grid-mode .pj-card { display:flex; flex-direction:column; height:100%; padding:0; position:relative; overflow:hidden; border-radius:12px; }
  .pj-grid-mode .pj-imgbox { position:relative; width:100%; aspect-ratio:1; overflow:hidden; background:var(--ink-900); flex-shrink:0; }
  .pj-grid-mode .pj-text { position:static; padding:16px 18px 18px; background:var(--paper-50); height:118px; box-sizing:border-box; overflow:hidden; }
  .pj-grid-mode .pj-title { font-size:20px; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pj-grid-mode .pj-desc { font-size:13px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .pj-grid-mode .pj-arrow { position:absolute; top:10px; right:10px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:var(--paper-50); border:2px solid var(--stroke); border-radius:50%; font-size:17px; color:var(--ink-700); }

  .pj-tag { font:500 11px 'Fira Code',monospace; letter-spacing:.4px; color:var(--accent-ink); background:var(--accent-soft); border-radius:980px; padding:3px 10px; transition:background .22s var(--ease-out), color .22s; }
  .pj-row:hover .pj-tag { background:var(--accent-ink); color:var(--paper-50); }
</style>
</helmet>

<div style="--accent:#34613C; --accent-ink:#34613C; --accent-soft:#BFE3C2; --hi-mint:#BFE3C2; --hi-yellow:#F2E07A; --font-body:'Lora','Kalam','Patrick Hand',cursive;">

  <nav style="position:sticky; top:0; z-index:50; background:rgba(251,246,233,0.86); backdrop-filter:blur(6px); border-bottom:2px solid var(--stroke);">
    <div style="max-width:1100px; margin:0 auto; padding:12px 28px; display:flex; align-items:center; justify-content:space-between;">
      <a href="The Living Journey.dc.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
        <span style="display:flex; align-items:center; justify-content:center; width:36px; height:36px; border:2px solid var(--stroke); background:var(--accent-soft); border-radius:38% 62% 63% 37% / 41% 44% 56% 59%; font:700 17px var(--font-marker); color:var(--accent-ink); transform:rotate(-4deg);">MT</span>
        <span style="font:400 20px var(--font-marker); color:var(--ink-900);">My Tran</span>
      </a>
      <a href="The Living Journey.dc.html" style="text-decoration:none; font:400 16px var(--font-marker); color:var(--ink-600); border-bottom:2px solid transparent;">← the living journey</a>
    </div>
  </nav>

  <header style="max-width:1100px; margin:0 auto; padding:64px 28px 30px;">
    <h1 style="margin:0 0 12px; font-weight:400; font-size:48px; line-height:1.1; font-family:'Patrick Hand','Comic Sans MS',cursive; color:var(--ink-900);">Projects</h1>
    <p style="margin:0 0 30px; max-width:640px; font:300 19px/1.55 var(--font-body); color:var(--ink-600);">Five ways of asking the same question — where does geospatial data create leverage? Filter by the skill you're looking for.</p>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="5">
        <button class="{{ f.cls }}" onClick="{{ f.onClick }}">{{ f.label }}</button>
      </sc-for>
    </div>
  </header>

  <main class="pj-list pj-fade {{ gridClass }}" style="max-width:1100px; margin:0 auto; padding:10px 28px 90px;">
    <sc-for list="{{ visibleProjects }}" as="proj" hint-placeholder-count="5">
      <a href="{{ proj.href }}" class="pj-row">
        <div class="pj-card">
          <div class="pj-imgbox">
            <img src="{{ proj.img }}" alt="{{ proj.title }}" style="width:100%; height:100%; object-fit:cover;">
          </div>
          <div class="pj-text">
            <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;">
              <sc-for list="{{ proj.catLabels }}" as="c" hint-placeholder-count="1">
                <span class="pj-tag">{{ c }}</span>
              </sc-for>
            </div>
            <h2 class="pj-title" style="margin:0 0 6px; font-weight:400; font-family:'Patrick Hand','Comic Sans MS',cursive; color:var(--ink-900);">{{ proj.title }}</h2>
            <p class="pj-desc" style="margin:0; font-family:var(--font-body); font-weight:300; color:var(--ink-600); max-width:520px;">{{ proj.desc }}</p>
          </div>
          <span class="pj-arrow">→</span>
        </div>
      </a>
    </sc-for>
  </main>

  <footer style="background:var(--ink-900); color:var(--paper-100); padding:56px 28px;">
    <div style="max-width:1100px; margin:0 auto; text-align:center;">
      <p style="margin:0 0 18px; font-weight:400; font-size:30px; font-family:'Patrick Hand','Comic Sans MS',cursive; font-style:italic; color:var(--paper-50);">Let's build something for the planet.</p>
      <a href="mailto:tran@uni.minerva.edu" style="text-decoration:none; padding:11px 24px; border:2px solid var(--paper-100); background:var(--paper-50); color:var(--ink-900); border-radius:255px 15px 225px 15px / 15px 225px 15px 255px; font:400 18px var(--font-marker);">Say hello</a>
    </div>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:900},&quot;squareGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { active: 'all', paused: false };

  PROJECTS = [
    { id:'measure', href:'project-measure.dc.html', img:'assets/SF_vegetation.jpg',
      title:'Reading a city three ways', cats:['ml'],
      desc:'U-Net & ViT segmentation of satellite imagery to surface urban inequality signals across San Francisco and Seoul.' },
    { id:'transfer', href:'project-transfer.dc.html', img:'assets/Japan_suitability.png',
      title:'Where does intervention matter most?', cats:['gis'],
      desc:'Geospatial suitability modeling of water-saving AWD irrigation across Japan\u2019s paddies.' },
    { id:'hpc', href:'project-hpc.dc.html', img:'assets/VN_suitability.jpg',
      title:'Streaming a continent through memory', cats:['engineer'],
      desc:'Out-of-core HPC architecture for processing 25 years of Landsat archive across 1,000,000 km\u00b2.' },
    { id:'infer', href:'project-infer.dc.html', img:'assets/figure3_gap.png',
      title:'Verifying impact from space', cats:['causal'],
      desc:'Satellite-embedding-matched synthetic control isolates the causal wildfire-risk gap left by prescribed burns.' },
    { id:'fuego', href:'project-fuego.dc.html', img:'assets/awd-composite-map.png',
      title:'Simulation in the hands of the frontline', cats:['engineer'],
      desc:'A sub-minute Cell2Fire wildfire spread pipeline, streamed live from raster to Mapbox vector tiles.' },
  ];

  CATS = [
    { id:'all', label:'All' },
    { id:'engineer', label:'Geospatial Engineer' },
    { id:'gis', label:'GIS' },
    { id:'causal', label:'Causal Inference' },
    { id:'ml', label:'ML' },
  ];

  CAT_LABELS = { engineer:'GEOSPATIAL ENGINEER', gis:'GIS', causal:'CAUSAL INFERENCE', ml:'ML' };

  selectCat(id) {
    this.setState({ active: id });
  }

  renderVals() {
    const active = this.state.active;
    const filters = this.CATS.map(c => ({
      label: c.label,
      cls: 'pj-filter' + (c.id === active ? ' pj-active' : ''),
      onClick: () => this.selectCat(c.id),
    }));

    const visible = this.PROJECTS.filter(p => active === 'all' || p.cats.includes(active));
    const visibleProjects = visible.map(p => ({
      ...p,
      catLabels: p.cats.map(c => this.CAT_LABELS[c]),
    }));

    return {
      filters,
      visibleProjects,
      gridClass: this.props.squareGrid === false ? 'pj-list-mode' : 'pj-grid-mode',
    };
  }
}

</script>
</body>
</html>
